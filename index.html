<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDS Completion Checklist & Leaderboard</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --accent-color: #66fcf1;
            --accent-hover: #45a29e;
            --text-color: #c5c6c7;
            --text-bright: #ffffff;
            --easy-color: #2ecc71;
            --casual-color: #27ae60;
            --inter-color: #f1c40f;
            --molten-color: #e67e22;
            --fallen-color: #e74c3c;
            --frost-color: #3498db;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 1600px;
            display: flex;
            gap: 20px;
        }

        .main-content {
            flex: 1;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #2f3e46;
        }

        .sidebar {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: var(--container-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #2f3e46;
        }

        h1, h2 {
            color: var(--text-bright);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.2);
            margin-bottom: 15px;
        }

        h1 { text-align: center; font-size: 24px; }
        h2 { font-size: 18px; border-bottom: 1px solid #2a3744; padding-bottom: 5px; color: var(--accent-color); }

        .profile-manager {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            background: var(--bg-color);
            border: 1px solid var(--accent-hover);
            color: var(--text-bright);
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
            font-size: 14px;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(102, 252, 241, 0.4);
        }

        button {
            background: var(--accent-hover);
            color: var(--bg-color);
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-size: 12px;
        }

        button:hover {
            background: var(--accent-color);
            transform: translateY(-1px);
        }

        .leaderboard-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #151b24;
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #3d526e;
            cursor: pointer;
        }

        .leaderboard-item.active {
            border-left-color: var(--accent-color);
            background: #1a2430;
        }

        .leaderboard-item:hover {
            background: #1e2936;
        }

        .player-info { display: flex; flex-direction: column; }
        .player-name { color: var(--text-bright); font-weight: bold; font-size: 14px; }
        .player-pct { font-size: 12px; color: var(--accent-color); }

        .delete-prof-btn {
            background: transparent;
            color: #ff7675;
            padding: 2px 6px;
            font-size: 10px;
        }
        .delete-prof-btn:hover { background: #3a1c1c; }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #1a222d; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #2a3744; font-size: 14px; }
        th { background-color: #151b24; color: var(--accent-color); text-transform: uppercase; font-size: 12px; }
        .th-center, .td-center { text-align: center; }
        tr:hover { background-color: #222d3b; }

        .map-name { color: var(--text-bright); font-weight: 600; cursor: pointer; }
        .map-name:hover { color: var(--accent-color); }

        .checkbox-container {
            display: inline-block;
            position: relative;
            cursor: pointer;
            width: 22px;
            height: 22px;
        }

        .checkbox-container input { position: absolute; opacity: 0; width: 0; height: 0; }
        .checkmark {
            position: absolute;
            top: 0; left: 0; height: 22px; width: 22px;
            background-color: #253141; border-radius: 4px;
            border: 2px solid #3d526e;
        }

        .checkbox-container input[data-diff="easy"]:checked ~ .checkmark { background-color: var(--easy-color); border-color: var(--easy-color); }
        .checkbox-container input[data-diff="casual"]:checked ~ .checkmark { background-color: var(--casual-color); border-color: var(--casual-color); }
        .checkbox-container input[data-diff="inter"]:checked ~ .checkmark { background-color: var(--inter-color); border-color: var(--inter-color); }
        .checkbox-container input[data-diff="molten"]:checked ~ .checkmark { background-color: var(--molten-color); border-color: var(--molten-color); }
        .checkbox-container input[data-diff="fallen"]:checked ~ .checkmark { background-color: var(--fallen-color); border-color: var(--fallen-color); }
        .checkbox-container input[data-diff="frost"]:checked ~ .checkmark { background-color: var(--frost-color); border-color: var(--frost-color); }

        .checkmark:after {
            content: ""; position: absolute; display: none;
            left: 6px; top: 2px; width: 4px; height: 8px;
            border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg);
        }
        .checkbox-container input:checked ~ .checkmark:after { display: block; }

        .preview-img-box { width: 100%; height: 160px; background: #151b24; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #3d526e; margin-top: 10px; position: relative;}
        .preview-img-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .preview-placeholder { color: #556c85; font-size: 12px; padding: 10px; text-align: center; }
        .preview-map-title { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); color: white; padding: 5px; font-size: 14px; font-weight: bold; text-align: center;}

        .highlight-row { animation: pulse-row 1s infinite alternate; }
        @keyframes pulse-row {
            from { background-color: rgba(102, 252, 241, 0.02); }
            to { background-color: rgba(102, 252, 241, 0.12); }
        }

        @media (max-width: 1000px) {
            .wrapper { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="main-content">
        <h1 id="main-title">TDS Progress: Игрок</h1>
        <div class="controls" style="margin-top: 15px;">
            <button id="btn-where-am-i">Где я остановился?</button>
            <button id="btn-reset" style="background: #3a1c1c; color: #ff7675;">Сбросить текущий профиль</button>
        </div>

        <div class="table-container">

                        <th class="th-center" style="color: var(--frost-color)">Frost</th>

                </thead>
                <tbody id="map-table-body"></tbody>
            </table>
        </div>
    </div>

    <div class="sidebar">
        <div class="panel">
            <h2>Таблица игроков</h2>
            <div class="profile-manager">
                <input type="text" id="new-player-name" placeholder="Ник нового игрока...">
                <button id="btn-add-player">Добавить</button>
            </div>
            <ul class="leaderboard-list" id="leaderboard-container"></ul>
        </div>

        <div class="panel">
            <h2>Обзор карты</h2>
            <div class="preview-img-box" id="p-img-box">
                <div class="preview-placeholder" id="p-placeholder">Наведи на карту, чтобы увидеть превью</div>
                <img src="" alt="Map Preview" id="p-img">

    </div>
</div>

    // Генерация нейтрального превью, если нет иконки
    function generateFallbackPreview(mapName) {
        return `
            <div style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#151b24; color:#556c85; font-size:12px; padding:10px;">

    // Сохранение данных
    function saveData() {
        localStorage.setItem('tds_players', JSON.stringify(playersData));
    }

    // Обновление прогресса для конкретного игрока
    function getPlayerProgress(playerName) {
        const total = mapsData.length * diffs.length;
        let checked = 0;
        if (playersData[playerName]) {
            Object.values(playersData[playerName]).forEach(val => { if (val) checked++; });
        }
        return total > 0 ? Math.round((checked / total) * 100) : 0;
    }

    // Обновление ледерборда (сортировка по процентам)
    function updateLeaderboard() {
        leaderboardContainer.innerHTML = '';
        const sortedPlayers = Object.keys(playersData).sort((a, b) => getPlayerProgress(b) - getPlayerProgress(a));

        sortedPlayers.forEach(playerName => {
            const pct = getPlayerProgress(playerName);
            const item = document.createElement('li');
            item.className = `leaderboard-item ${playerName === currentPlayer ? 'active' : ''}`;
            item.innerHTML = `
                <div class="player-info">
                    <span class="player-name">${playerName}</span>
                    <span class="player-pct">${pct}% Пройдено</span>
                </div>
                <button class="delete-prof-btn" data-player="${playerName}">×</button>
            `;
            leaderboardContainer.appendChild(item);
        });
    }

        tableBody.innerHTML = '';
        mainTitle.innerText = `TDS Progress: ${currentPlayer}`;

        mapsData.forEach((map, index) => {
            const row = document.createElement('tr');
            row.id = `map-row-${index}`;
            let rowHtml = `<td><span class="map-name" data-index="${index}">${map.name}</span></td>`;

            diffs.forEach(diff => {
                const key = `${map.name}_${diff}`;
                const isChecked = playersData[currentPlayer] && playersData[currentPlayer][key] ? 'checked' : '';
                rowHtml += `
                    <td class="td-center">
                        <label class="checkbox-container">
                            <input type="checkbox" data-map="${map.name}" data-diff="${diff}" ${isChecked}>
                            <span class="checkmark"></span>
                        </label>
                    </td>`;
            });
            row.innerHTML = rowHtml;
            tableBody.appendChild(row);
        });
    }

    // Переключение профиля
    leaderboardContainer.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-prof-btn')) {
            const playerToDelete = e.target.getAttribute('data-player');
            if (confirm(`Удалить профиль "${playerToDelete}" и весь его прогресс?`)) {
                delete playersData[playerToDelete];
                if (currentPlayer === playerToDelete) {
                    currentPlayer = Object.keys(playersData)[0] || 'Игрок';
                    if (!playersData[currentPlayer]) playersData[currentPlayer] = {};
                }
                saveData();
                updateLeaderboard();
                renderChecklist();
            }
            return;
        }

        const item = e.target.closest('.leaderboard-item');
        if (item) {
            currentPlayer = item.querySelector('.player-name').innerText;
            renderChecklist();
            updateLeaderboard();
        }
    });

    // Добавление нового профиля
    document.getElementById('btn-add-player').addEventListener('click', () => {
        const newPlayerName = newPlayerInput.value.trim();
        if (newPlayerName && !playersData[newPlayerName]) {
            playersData[newPlayerName] = {};
            newPlayerInput.value = '';
            currentPlayer = newPlayerName;
            saveData();
            updateLeaderboard();
            renderChecklist();
        } else if (playersData[newPlayerName]) {
            alert('Игрок с таким ником уже есть!');
        }
    });

    // Клики по чекбоксам
    tableBody.addEventListener('change', (e) => {
        if (e.target.type === 'checkbox') {
            const mapName = e.target.getAttribute('data-map');
            const diff = e.target.getAttribute('data-diff');
            if (!playersData[currentPlayer]) playersData[currentPlayer] = {};
            playersData[currentPlayer][`${mapName}_${diff}`] = e.target.checked;
            saveData();
            updateLeaderboard(); // Обновляем проценты в ледерборде мгновенно
        }
    });

    // Фича "Где я остановился?"
    document.getElementById('btn-where-am-i').addEventListener('click', () => {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('highlight-row'));
        for (let i = 0; i < mapsData.length; i++) {
            let mapComplete = true;
            for (let diff of diffs) {
                if (!playersData[currentPlayer] || !playersData[currentPlayer][`${mapsData[i].name}_${diff}`]) {
                    mapComplete = false; break;
                }
            }
            if (!mapComplete) {
                const targetRow = document.getElementById(`map-row-${i}`);
                targetRow.classList.add('highlight-row');
                targetRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                break;
            }
        }
    });

    // Сброс текущего профиля
    document.getElementById('btn-reset').addEventListener('click', () => {
        if (confirm(`Очистить весь прогресс карт для текущего профиля "${currentPlayer}"?`)) {
            playersData[currentPlayer] = {};
            saveData();
            renderChecklist();
            updateLeaderboard();
        }
    });

    // Наведение на карту для превью
    tableBody.addEventListener('mouseover', (e) => {
        if (e.target.classList.contains('map-name')) {
            const mapIndex = e.target.getAttribute('data-index');
            const map = mapsData[mapIndex];

            if (map.img) {
                pImg.src = map.img;
                pImg.style.display = 'block';
                pMapTitle.innerText = map.name;
                pMapTitle.style.display = 'block';
                pPlaceholder.style.display = 'none';
                // Убираем старое нейтральное превью, если оно было
                const oldFallback = pImgBox.querySelector('div[style*="width:100%"]');
                if(oldFallback) oldFallback.remove();
            } else {
                pImg.style.display = 'none';
                pMapTitle.style.display = 'none';
                pPlaceholder.style.display = 'none';
                // Добавляем красивое нейтральное превью
                const oldFallback = pImgBox.querySelector('div[style*="width:100%"]');
                if(oldFallback) oldFallback.remove();
                pImgBox.insertAdjacentHTML('afterbegin', generateFallbackPreview(map.name));
            }
        }
    });

    // Инициализация
    if(Object.keys(playersData).length === 0) playersData = {'Игрок': {}};
    if(!currentPlayer) currentPlayer = Object.keys(playersData)[0];
    updateLeaderboard();
    renderChecklist();
</script>
</body>
</html>
