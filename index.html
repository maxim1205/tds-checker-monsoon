<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDS Completion Checklist & Leaderboard</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --accent-color: #66fcf1;
            --accent-hover: #45a29e;
            --text-color: #c5c6c7;
            --text-bright: #ffffff;
            --easy-color: #2ecc71;
            --casual-color: #27ae60;
            --inter-color: #f1c40f;
            --molten-color: #e67e22;
            --fallen-color: #e74c3c;
            --frost-color: #3498db;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 1600px;
            display: flex;
            gap: 20px;
        }

        .main-content {
            flex: 1;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #2f3e46;
        }

        .sidebar {
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: var(--container-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #2f3e46;
        }

        h1, h2 {
            color: var(--text-bright);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.2);
            margin-bottom: 15px;
        }

        h1 { text-align: center; font-size: 24px; }
        h2 { font-size: 18px; border-bottom: 1px solid #2a3744; padding-bottom: 5px; color: var(--accent-color); }

        .auth-warning {
            background: #4a1515;
            color: #ff9f9f;
            padding: 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 12px;
            border: 1px solid #e74c3c;
            text-align: center;
        }

        /* Вкладки для Входа / Регистрации */
        .auth-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 12px;
            border-bottom: 1px solid #2a3744;
            padding-bottom: 5px;
        }

        .auth-tab-btn {
            flex: 1;
            background: #151b24;
            color: var(--text-color);
            border: 1px solid #2a3744;
            padding: 6px;
            cursor: pointer;
            font-size: 11px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .auth-tab-btn.active {
            background: var(--accent-hover);
            color: var(--bg-color);
            border-color: var(--accent-color);
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .auth-form.active {
            display: flex;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--accent-hover);
            color: var(--text-bright);
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
            font-size: 13px;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(102, 252, 241, 0.4);
        }

        .submit-btn {
            background: var(--accent-hover);
            color: var(--bg-color);
            border: none;
            padding: 9px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            width: 100%;
            transition: all 0.2s ease;
        }

        .submit-btn:hover {
            background: var(--accent-color);
            transform: translateY(-1px);
        }

        .leaderboard-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 10px;
            border-top: 1px solid #2a3744;
            padding-top: 10px;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #151b24;
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #3d526e;
            cursor: pointer;
        }

        .leaderboard-item.active {
            border-left-color: var(--accent-color);
            background: #1a2430;
        }

        .leaderboard-item:hover {
            background: #1e2936;
        }

        .player-info { display: flex; flex-direction: column; }
        .player-name { color: var(--text-bright); font-weight: bold; font-size: 14px; }
        .player-pct { font-size: 12px; color: var(--accent-color); }

        .delete-prof-btn {
            background: transparent;
            color: #ff7675;
            padding: 2px 6px;
            font-size: 12px;
            border: none;
            cursor: pointer;
        }
        .delete-prof-btn:hover { background: #3a1c1c; border-radius: 4px; }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .controls button {
            background: var(--accent-hover);
            color: var(--bg-color);
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
        }
        .controls button:hover { background: var(--accent-color); }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #1a222d; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #2a3744; font-size: 14px; }
        th { background-color: #151b24; color: var(--accent-color); text-transform: uppercase; font-size: 12px; }
        .th-center, .td-center { text-align: center; }
        tr:hover { background-color: #222d3b; }

        .map-name { color: var(--text-bright); font-weight: 600; display: block; width: 100%; }

        .checkbox-container {
            display: inline-block;
            position: relative;
            cursor: pointer;
            width: 22px;
            height: 22px;
        }

        .checkbox-container input { position: absolute; opacity: 0; width: 0; height: 0; }
        .checkmark {
            position: absolute;
            top: 0; left: 0; height: 22px; width: 22px;
            background-color: #253141; border-radius: 4px;
            border: 2px solid #3d526e;
        }

        .checkbox-container input[data-diff="easy"]:checked ~ .checkmark { background-color: var(--easy-color); border-color: var(--easy-color); }
        .checkbox-container input[data-diff="casual"]:checked ~ .checkmark { background-color: var(--casual-color); border-color: var(--casual-color); }
        .checkbox-container input[data-diff="inter"]:checked ~ .checkmark { background-color: var(--inter-color); border-color: var(--inter-color); }
        .checkbox-container input[data-diff="molten"]:checked ~ .checkmark { background-color: var(--molten-color); border-color: var(--molten-color); }
        .checkbox-container input[data-diff="fallen"]:checked ~ .checkmark { background-color: var(--fallen-color); border-color: var(--fallen-color); }
        .checkbox-container input[data-diff="frost"]:checked ~ .checkmark { background-color: var(--frost-color); border-color: var(--frost-color); }

        .checkmark:after {
            content: ""; position: absolute; display: none;
            left: 6px; top: 2px; width: 4px; height: 8px;
            border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg);
        }
        .checkbox-container input:checked ~ .checkmark:after { display: block; }

        .highlight-row { animation: pulse-row 1s infinite alternate; }
        @keyframes pulse-row {
            from { background-color: rgba(102, 252, 241, 0.02); }
            to { background-color: rgba(102, 252, 241, 0.12); }
        }

        @media (max-width: 1000px) {
            .wrapper { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="main-content">
        <h1 id="main-title">TDS Progress: Игрок</h1>
        <div class="controls" style="margin-top: 15px;">
            <button id="btn-where-am-i">Где я остановился?</button>
            <button id="btn-reset" style="background: #3a1c1c; color: #ff7675;">Сбросить текущий прогресс</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Карта</th>
                        <th class="th-center" style="color: var(--easy-color)">Easy</th>
                        <th class="th-center" style="color: var(--casual-color)">Casual</th>
                        <th class="th-center" style="color: var(--inter-color)">Intermediate</th>
                        <th class="th-center" style="color: var(--molten-color)">Molten</th>
                        <th class="th-center" style="color: var(--fallen-color)">Fallen</th>
                        <th class="th-center" style="color: var(--frost-color)">Frost</th>
                    </tr>
                </thead>
                <tbody id="map-table-body"></tbody>
            </table>
        </div>
    </div>

    <div class="sidebar">
        <div class="panel">
            <h2>Таблица игроков</h2>
            <div class="auth-warning">
                ⚠️ ВНИМАНИЕ: Придумывай новый пароль!<br>НЕ используй пароли от Roblox или почты!
            </div>
            
            <div class="auth-tabs">
                <button class="auth-tab-btn active" onclick="switchAuthTab('login')">Вход</button>
                <button class="auth-tab-btn" onclick="switchAuthTab('register')">Регистрация</button>
            </div>

            <div id="form-login" class="auth-form active">
                <input type="text" id="login-username" placeholder="Твой ник...">
                <input type="password" id="login-password" placeholder="Твой пароль...">
                <button class="submit-btn" id="btn-login-submit">Войти</button>
            </div>

            <div id="form-register" class="auth-form">
                <input type="text" id="reg-username" placeholder="Придумай ник...">
                <input type="password" id="reg-password" placeholder="Придумай пароль...">
                <button class="submit-btn" id="btn-reg-submit" style="background: #27ae60; color: white;">Создать аккаунт</button>
            </div>

            <ul class="leaderboard-list" id="leaderboard-container"></ul>
        </div>
    </div>
</div>

<script>
    const mapsData = [
        { name: "Abandoned City" },
        { name: "Abyssal Trench" },
        { name: "Area 52" },
        { name: "Atlas Colosseum" },
        { name: "Autumn Falling" },
        { name: "Black Spot Exchange" },
        { name: "Candy Valley" },
        { name: "Cataclysm" },
        { name: "Chess Board" },
        { name: "Construction Crazy" },
        { name: "Coral Deep" },
        { name: "Crossroads" },
        { name: "Crystal Cave" },
        { name: "Cyber City" },
        { name: "Dead Ahead" },
        { name: "Derelict Outpost" },
        { name: "Deserted Village" },
        { name: "Dusty Bridges" },
        { name: "Enchanted Forest" },
        { name: "Farm Lands" },
        { name: "Forest Camp" },
        { name: "Four Seasons" },
        { name: "Fungi Island" },
        { name: "Gilded Path" },
        { name: "Grass Isle" },
        { name: "Happy Home of Robloxia" },
        { name: "Harbor" },
        { name: "Honey Valley" },
        { name: "Hot Spot" },
        { name: "Iceville" },
        { name: "Infernal Abyss" },
        { name: "Lay By" },
        { name: "Lighthouse" },
        { name: "Marshlands" },
        { name: "Mason Arch" },
        { name: "Medieval Times" },
        { name: "Meltdown" },
        { name: "Midnight Issue" },
        { name: "Moon Base" },
        { name: "Musaceae Kingdom" },
        { name: "Necropolis" },
        { name: "Nether" },
        { name: "Night Station" },
        { name: "Northern Lights" },
        { name: "Pier Pressure" },
        { name: "Portland" },
        { name: "Retro Crossroads" },
        { name: "Retro Lighthouse" },
        { name: "Retro Rocket Arena" },
        { name: "Retro Stained Temple" },
        { name: "Retro Heights" },
        { name: "Retro Zone" },
        { name: "Rocket Arena" },
        { name: "Ruby Escort" },
        { name: "Sacred Mountains" },
        { name: "Simplicity" },
        { name: "Sky Islands" },
        { name: "Space City" },
        { name: "Spring Fever" },
        { name: "Stained Temple" },
        { name: "Sugar Rush" },
        { name: "Summer Castle" },
        { name: "The Heavens" },
        { name: "The Heights" },
        { name: "Toyboard" },
        { name: "Tropical Industries" },
        { name: "Tropical Isles" },
        { name: "U-Turn" },
        { name: "Winter Abyss" },
        { name: "Winter Bridges" },
        { name: "Winter Stronghold" },
        { name: "Wrecked Battlefield" },
        { name: "Wrecked Battlefield II" },
        { name: "Forgotten Docks" },
        { name: "Legacy Dusty Bridges" },
        { name: "Legacy Gilded Path" },
        { name: "Legacy Retro Zone" },
        { name: "Legacy Simplicity" },
        { name: "Legacy Space City" },
        { name: "Legacy Toyboard" },
        { name: "Legacy Winter Abyss" }
    ];

    const diffs = ['easy', 'casual', 'inter', 'molten', 'fallen', 'frost'];
    const tableBody = document.getElementById('map-table-body');
    const mainTitle = document.getElementById('main-title');
    const leaderboardContainer = document.getElementById('leaderboard-container');

    let currentPlayer = 'Игрок';
    
    let playersData = JSON.parse(localStorage.getItem('tds_secured_players')) || { 
        'Игрок': { password: '', progress: {} } 
    };

    // Переключение вкладок формы
    function switchAuthTab(type) {
        document.querySelectorAll('.auth-tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        
        if (type === 'login') {
            document.querySelectorAll('.auth-tab-btn')[0].classList.add('active');
            document.getElementById('form-login').classList.add('active');
        } else {
            document.querySelectorAll('.auth-tab-btn')[1].classList.add('active');
            document.getElementById('form-register').classList.add('active');
        }
    }

    function saveData() {
        localStorage.setItem('tds_secured_players', JSON.stringify(playersData));
    }

    function getPlayerProgress(playerName) {
        const total = mapsData.length * diffs.length;
        let checked = 0;
        if (playersData[playerName] && playersData[playerName].progress) {
            Object.values(playersData[playerName].progress).forEach(val => { if (val) checked++; });
        }
        return total > 0 ? Math.round((checked / total) * 100) : 0;
    }

    function updateLeaderboard() {
        leaderboardContainer.innerHTML = '';
        const sortedPlayers = Object.keys(playersData).sort((a, b) => getPlayerProgress(b) - getPlayerProgress(a));

        sortedPlayers.forEach(playerName => {
            const pct = getPlayerProgress(playerName);
            const item = document.createElement('li');
            item.className = `leaderboard-item ${playerName === currentPlayer ? 'active' : ''}`;
            item.innerHTML = `
                <div class="player-info">
                    <span class="player-name">${playerName}</span>
                    <span class="player-pct">${pct}% Пройдено</span>
                </div>
                <button class="delete-prof-btn" data-player="${playerName}">×</button>
            `;
            leaderboardContainer.appendChild(item);
        });
    }

    function renderChecklist() {
        tableBody.innerHTML = '';
        mainTitle.innerText = `TDS Progress: ${currentPlayer}`;

        mapsData.forEach((map, index) => {
            const row = document.createElement('tr');
            row.id = `map-row-${index}`;
            let rowHtml = `<td><span class="map-name">${map.name}</span></td>`;

            diffs.forEach(diff => {
                const key = `${map.name}_${diff}`;
                const isChecked = playersData[currentPlayer] && playersData[currentPlayer].progress && playersData[currentPlayer].progress[key] ? 'checked' : '';
                rowHtml += `
                    <td class="td-center">
                        <label class="checkbox-container">
                            <input type="checkbox" data-map="${map.name}" data-diff="${diff}" ${isChecked}>
                            <span class="checkmark"></span>
                        </label>
                    </td>`;
            });
            row.innerHTML = rowHtml;
            tableBody.appendChild(row);
        });
    }

    // Клик по таблице лидеров — смена аккаунта
    leaderboardContainer.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-prof-btn')) {
            const playerToDelete = e.target.getAttribute('data-player');
            
            if (playersData[playerToDelete].password !== '') {
                const passCheck = prompt(`Введите пароль для удаления профиля "${playerToDelete}":`);
                if (passCheck !== playersData[playerToDelete].password) {
                    alert('Неверный пароль! Удаление отменено.');
                    return;
                }
            } else {
                if (!confirm(`Удалить профиль "${playerToDelete}"?`)) return;
            }

            delete playersData[playerToDelete];
            if (currentPlayer === playerToDelete) {
                currentPlayer = Object.keys(playersData)[0] || 'Игрок';
                if (!playersData[currentPlayer]) playersData[currentPlayer] = { password: '', progress: {} };
            }
            saveData();
            updateLeaderboard();
            renderChecklist();
            return;
        }

        const item = e.target.closest('.leaderboard-item');
        if (item) {
            const targetPlayer = item.querySelector('.player-name').innerText;
            
            if (playersData[targetPlayer].password !== '' && targetPlayer !== currentPlayer) {
                const passCheck = prompt(`Профиль "${targetPlayer}" защищён паролем. Введите пароль для входа:`);
                if (passCheck !== playersData[targetPlayer].password) {
                    alert('Неверный пароль!');
                    return;
                }
            }

            currentPlayer = targetPlayer;
            renderChecklist();
            updateLeaderboard();
        }
    });

    // ОБРАБОТКА ВХОДА
    document.getElementById('btn-login-submit').addEventListener('click', () => {
        const name = document.getElementById('login-username').value.trim();
        const pass = document.getElementById('login-password').value.trim();

        if (!name) { alert('Введите ник игрока!'); return; }

        if (!playersData[name]) {
            alert('Такой игрок не найден! Сначала зарегистрируйся во вкладке "Регистрация".');
            return;
        }

        if (playersData[name].password !== pass) {
            alert('Неверный пароль!');
            return;
        }

        currentPlayer = name;
        document.getElementById('login-username').value = '';
        document.getElementById('login-password').value = '';
        alert(`Успешный вход! Текущий игрок: ${name}`);
        updateLeaderboard();
        renderChecklist();
    });

    // ОБРАБОТКА РЕГИСТРАЦИИ
    document.getElementById('btn-reg-submit').addEventListener('click', () => {
        const name = document.getElementById('reg-username').value.trim();
        const pass = document.getElementById('reg-password').value.trim();

        if (!name) { alert('Придумай ник!'); return; }
        if (!pass) { alert('Придумай пароль!'); return; }

        if (playersData[name]) {
            alert('Игрок с таким ником уже существует! Выбери другой ник или войди.');
            return;
        }

        playersData[name] = {
            password: pass,
            progress: {}
        };
        
        currentPlayer = name;
        document.getElementById('reg-username').value = '';
        document.getElementById('reg-password').value = '';
        
        saveData();
        alert(`Аккаунт ${name} успешно создан!`);
        switchAuthTab('login');
        updateLeaderboard();
        renderChecklist();
    });

    // Изменение чекбоксов карт
    tableBody.addEventListener('change', (e) => {
        if (e.target.type === 'checkbox') {
            const mapName = e.target.getAttribute('data-map');
            const diff = e.target.getAttribute('data-diff');
            
            if (!playersData[currentPlayer].progress) playersData[currentPlayer].progress = {};
            playersData[currentPlayer].progress[`${mapName}_${diff}`] = e.target.checked;
            
            saveData();
            updateLeaderboard();
        }
    });

    // Поиск незакрытых карт "Где я остановился?"
    document.getElementById('btn-where-am-i').addEventListener('click', () => {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('highlight-row'));
        for (let i = 0; i < mapsData.length; i++) {
            let mapComplete = true;
            for (let diff of diffs) {
                if (!playersData[currentPlayer].progress || !playersData[currentPlayer].progress[`${mapsData[i].name}_${diff}`]) {
                    mapComplete = false; 
                    break;
                }
            }
            if (!mapComplete) {
                const targetRow = document.getElementById(`map-row-${i}`);
                if (targetRow) {
                    targetRow.classList.add('highlight-row');
                    targetRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                break;
            }
        }
    });

    // Сброс текущего прогресса
    document.getElementById('btn-reset').addEventListener('click', () => {
        if (confirm(`Очистить весь прогресс карт для текущего профиля "${currentPlayer}"?`)) {
            playersData[currentPlayer].progress = {};
            saveData();
            renderChecklist();
            updateLeaderboard();
        }
    });

    // Старт
    updateLeaderboard();
    renderChecklist();
</script>
</body>
</html>
