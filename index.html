<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDS Completion Checklist</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --accent-color: #66fcf1;
            --accent-hover: #45a29e;
            --text-color: #c5c6c7;
            --text-bright: #ffffff;
            --easy-color: #2ecc71;
            --casual-color: #f1c40f;
            --inter-color: #e67e22;
            --molten-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 1200px;
            display: flex;
            gap: 20px;
            position: relative;
        }

        .main-content {
            flex: 1;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #2f3e46;
        }

        h1 {
            color: var(--text-bright);
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
        }

        /* Панель профиля и прогресса */
        .profile-section {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            align-items: center;
            background: #151b24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            border-left: 4px solid var(--accent-color);
        }

        .nickname-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nickname-wrapper label {
            color: var(--accent-color);
            font-weight: bold;
        }

        input[type="text"] {
            background: var(--bg-color);
            border: 1px solid var(--accent-hover);
            color: var(--text-bright);
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
            font-size: 16px;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(102, 252, 241, 0.5);
        }

        .stats {
            font-size: 16px;
            color: var(--text-bright);
        }

        .stats span {
            color: var(--accent-color);
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            background: var(--accent-hover);
            color: var(--bg-color);
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-size: 13px;
        }

        button:hover {
            background: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 252, 241, 0.3);
        }

        /* Таблица */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: #1a222d;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #2a3744;
        }

        th {
            background-color: #151b24;
            color: var(--accent-color);
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .th-center, .td-center {
            text-align: center;
        }

        tr:hover {
            background-color: #222d3b;
        }

        .map-name {
            color: var(--text-bright);
            font-weight: 600;
            cursor: pointer;
            position: relative;
            display: inline-block;
        }

        .map-name:hover {
            color: var(--accent-color);
        }

        .map-tag {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            background: #2f3e46;
            color: #9cc4b3;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* Кастомные чекбоксы с анимацией */
        .checkbox-container {
            display: inline-block;
            position: relative;
            cursor: pointer;
            font-size: 22px;
            user-select: none;
            width: 28px;
            height: 28px;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 28px;
            width: 28px;
            background-color: #253141;
            border-radius: 6px;
            border: 2px solid #3d526e;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .checkbox-container:hover input ~ .checkmark {
            border-color: var(--accent-color);
        }

        /* Анимация активации разных сложностей */
        .checkbox-container input[data-diff="easy"]:checked ~ .checkmark {
            background-color: var(--easy-color);
            border-color: var(--easy-color);
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }
        .checkbox-container input[data-diff="casual"]:checked ~ .checkmark {
            background-color: var(--casual-color);
            border-color: var(--casual-color);
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }
        .checkbox-container input[data-diff="inter"]:checked ~ .checkmark {
            background-color: var(--inter-color);
            border-color: var(--inter-color);
            box-shadow: 0 0 10px rgba(230, 126, 34, 0.5);
        }
        .checkbox-container input[data-diff="molten"]:checked ~ .checkmark {
            background-color: var(--molten-color);
            border-color: var(--molten-color);
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 9px;
            top: 4px;
            width: 6px;
            height: 12px;
            border: solid white;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .checkbox-container input:checked ~ .checkmark {
            transform: scale(1.1);
        }

        /* Виджет предпросмотра карты */
        .preview-sidebar {
            width: 300px;
            background: var(--container-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #2f3e46;
            height: fit-content;
            position: sticky;
            top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .preview-title {
            color: var(--accent-color);
            font-size: 18px;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .preview-img-box {
            width: 100%;
            height: 160px;
            background: #151b24;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #3d526e;
        }

        .preview-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .preview-placeholder {
            color: #556c85;
            font-size: 14px;
            padding: 10px;
        }

        .highlight-row {
            animation: pulse-row 2s infinite alternate;
        }

        @keyframes pulse-row {
            from { background-color: rgba(102, 252, 241, 0.05); }
            to { background-color: rgba(102, 252, 241, 0.15); }
        }

        @media (max-width: 900px) {
            .wrapper { flex-direction: column; }
            .preview-sidebar { width: 100%; position: static; }
        }
    </style>
</head>

</div>

        { name: "Winter Stronghold", type: "Стандартная", img: "https://static.wikia.nocookie.net/towerdefensesimulator/images/6/6e/Winter_Stronghold_Icon.png" },
        { name: "Wrecked Battlefield", type: "Стандартная", img: "https://static.wikia.nocookie.net/towerdefensesimulator/images/4/4a/Wrecked_Battlefield_Icon.png" },
        { name: "Wrecked Battlefield II", type: "Стандартная", img: "https://static.wikia.nocookie.net/towerdefensesimulator/images/a/a2/Wrecked_Battlefield_II_Icon.png" }
    ];

    const diffs = ['easy', 'casual', 'inter', 'molten'];
    const tableBody = document.getElementById('map-table-body');
    const usernameInput = document.getElementById('username');
    const progressText = document.getElementById('progress-text');
    const progressPercent = document.getElementById('progress-percent');
    
    // Элементы превью
    const pTitle = document.getElementById('p-title');
    const pPlaceholder = document.getElementById('p-placeholder');
    const pImg = document.getElementById('p-img');

    // Загрузка сохраненного никнейма
    if(localStorage.getItem('tds_nickname')) {
        usernameInput.value = localStorage.getItem('tds_nickname');
    }

    usernameInput.addEventListener('input', () => {
        localStorage.setItem('tds_nickname', usernameInput.value);
    });

    // Генерация таблицы
    mapsData.forEach((map, index) => {
        const row = document.createElement('tr');
        row.id = `map-row-${index}`;
        
        let tagHtml = map.type !== "Стандартная" ? `<span class="map-tag">${map.type}</span>` : '';
        
        let rowHtml = `
            <td>
                <span class="map-name" data-index="${index}">${map.name}</span>
                ${tagHtml}
            </td>
        `;

        diffs.forEach(diff => {
            const key = `tds_${map.name}_${diff}`;
            const isChecked = localStorage.getItem(key) === 'true' ? 'checked' : '';
            rowHtml += `
                <td class="td-center">
                    <label class="checkbox-container">
                        <input type="checkbox" data-map="${map.name}" data-diff="${diff}" ${isChecked}>
                        <span class="checkmark"></span>
                    </label>
                </td>
            `;
        });

        row.innerHTML = rowHtml;
        tableBody.appendChild(row);
    });

    // Обновление прогресса
    function updateProgress() {
        const totalCheckboxes = mapsData.length * diffs.length;
        let checkedCount = 0;
        
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            if(cb.checked) checkedCount++;
        });

        progressText.innerText = `${checkedCount} / ${totalCheckboxes}`;
        const percent = totalCheckboxes > 0 ? Math.round((checkedCount / totalCheckboxes) * 100) : 0;
        progressPercent.innerText = `${percent}%`;
    }

    // Слушатель кликов по чекбоксам
    tableBody.addEventListener('change', (e) => {
        if(e.target.type === 'checkbox') {
            const mapName = e.target.getAttribute('data-map');
            const diff = e.target.getAttribute('data-diff');
            const key = `tds_${mapName}_${diff}`;
            localStorage.setItem(key, e.target.checked);
            updateProgress();
        }
    });

    // Наведение мышки для превью картинки
    tableBody.addEventListener('mouseover', (e) => {
        if(e.target.classList.contains('map-name')) {
            const index = e.target.getAttribute('data-index');
            const map = mapsData[index];
            
            pTitle.innerText = map.name;
            if(map.img) {
                pImg.src = map.img;
                pImg.style.display = 'block';
                pPlaceholder.style.display = 'none';
            } else {
                pImg.style.display = 'none';
                pPlaceholder.style.display = 'block';
                pPlaceholder.innerText = 'Нет изображения для этой старой карты';
            }
        }
    });

    // Фича "Где я остановился?"
    document.getElementById('btn-where-am-i').addEventListener('click', () => {
        // Убираем прошлую подсветку
        document.querySelectorAll('tr').forEach(r => r.classList.remove('highlight-row'));

        // Ищем первую карту, где заполнено не все
        for(let i = 0; i < mapsData.length; i++) {
            let mapComplete = true;
            diffs.forEach(diff => {
                const checked = localStorage.getItem(`tds_${mapsData[i].name}_${diff}`) === 'true';
                if(!checked) mapComplete = false;
            });

            if(!mapComplete) {
                const targetRow = document.getElementById(`map-row-${i}`);
                targetRow.classList.add('highlight-row');
                targetRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                break;
            }
        }
    });

    // Сброс всех галочек
    document.getElementById('btn-reset').addEventListener('click', () => {
        if(confirm('Ты уверен, что хочешь полностью сбросить весь прогресс карт?')) {
            mapsData.forEach(map => {
                diffs.forEach(diff => {
                    localStorage.removeItem(`tds_${map.name}_${diff}`);
                });
            });
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            updateProgress();
        }
    });

    // Инициализация при старте
    updateProgress();
</script>
</body>
</html>
